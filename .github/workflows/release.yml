name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify:
    name: Verify Before Release
    runs-on: [self-hosted, Linux, X64, docker]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo version
        run: |
          CARGO_VERSION="$(awk -F'"' '$1 ~ /^version = / { print $2; exit }' Cargo.toml)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Formatting check
        run: cargo fmt --all -- --check

      - name: Unit and integration tests
        run: cargo test --all-targets

      - name: Full regression (Docker SSH flow)
        run: ./scripts/regression.sh

  build:
    name: Build (${{ matrix.os }})
    needs: verify
    runs-on: [self-hosted, Linux, X64, docker]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: cyberdeck
          - os: macos-latest
            bin: cyberdeck
          - os: windows-latest
            bin: cyberdeck.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package archive (Linux/macOS)
        if: runner.os != 'Windows'
        id: package_unix
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"
          TARGET="$(rustc -vV | awk '/^host: / { print $2 }')"
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="cyberdeck-${VERSION}-${TARGET}.tar.gz"
          tar -C dist -czf "$ARCHIVE" "${{ matrix.bin }}"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        id: package_windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.bin }}" "dist/${{ matrix.bin }}"
          $target = ((rustc -vV | Select-String '^host:\s+').ToString() -replace '^host:\s+', '')
          $version = $env:GITHUB_REF_NAME.Substring(1)
          $archive = "cyberdeck-$version-$target.zip"
          Compress-Archive -Path "dist/${{ matrix.bin }}" -DestinationPath $archive -Force
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "target=$target" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.package_unix.outputs.target }}
          path: ${{ steps.package_unix.outputs.archive }}

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.package_windows.outputs.target }}
          path: ${{ steps.package_windows.outputs.archive }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: [self-hosted, Linux, X64, docker]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
