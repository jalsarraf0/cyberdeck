[graph]
all-features = true

[advisories]
unmaintained = "deny"
unsound = "deny"
yanked = "deny"
notice = "warn"

[bans]
multiple-versions = "warn"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "0BSD",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "OpenSSL",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
  "BSL-1.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
